server:
  port: 0

spring:
  application:
    name: product-service

  # PostgreSQL backing the Transactional Outbox table. Debezium reads this database's
  # WAL directly (CDC) and publishes new outbox_events rows to Kafka.
  datasource:
    url: jdbc:postgresql://localhost:5433/productdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cloud:
    function:
      definition: orderCreated
    stream:
      kafka:
        binder:
          brokers: localhost:9092
      bindings:
        # Consumer: "orderCreated" function reads Kafka topic "order-created" (published by
        # order-service's Debezium outbox connector, not by a Spring Cloud Stream producer).
        orderCreated-in-0:
          destination: order-created
          group: product-service
          content-type: application/json # Debezium doesn't set a contentType header

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true # kendini ayağa kalktığın an eurekaya tanıt
    fetch-registry: true # istenildiğinde diğer servislerin bilgisini çek
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
    prefer-ip-address: true
