server:
  port: 8071

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/Kkaan9/etiya11-microservices-debezium
          default-label: main
          search-paths: configs/{application}
          clone-on-start: true
          force-pull: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
