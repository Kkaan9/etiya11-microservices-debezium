server:
  port: 0

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cloud:
    function:
      definition: orderCreated
    stream:
      bindings:
        # Consumer: "orderCreated" function reads Kafka topic "order-created" (published by
        # order-service's Debezium outbox connector, not by a Spring Cloud Stream producer).
        orderCreated-in-0:
          destination: order-created
          group: product-service
          content-type: application/json # Debezium doesn't set a contentType header

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    register-with-eureka: true # kendini ayağa kalktığın an eurekaya tanıt
    fetch-registry: true # istenildiğinde diğer servislerin bilgisini çek
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
    prefer-ip-address: true
