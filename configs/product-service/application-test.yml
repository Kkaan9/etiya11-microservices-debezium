spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/productdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/etiya-crm-project
  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
