# PostgreSQL backing the Transactional Outbox table. Debezium reads this database's
# WAL directly (CDC) and publishes new outbox_events rows to Kafka.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/productdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
