# MySQL backing the Transactional Outbox table. Debezium reads this database's
# binlog directly (CDC) and publishes new outbox_events rows to Kafka - order-service
# itself no longer talks to Kafka at all.
spring:
  datasource:
    url: jdbc:mysql://localhost:3307/orderdb
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/etiya-crm-project

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
